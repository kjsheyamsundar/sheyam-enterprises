<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B1B5C" />
    <meta name="format-detection" content="telephone=yes" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Sheyam Enterprises" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Performance: preconnect for Google Fonts + Maps -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://maps.google.com" />
    <link rel="dns-prefetch" href="https://maps.google.com" />
    <link rel="dns-prefetch" href="https://wa.me" />

    <!-- Async Google Fonts: preload + swap-in via onload so the CSS doesn't
         block first paint. Falls back to a synchronous load inside <noscript>
         so SSR/no-JS clients still get the webfonts. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@300;400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Per-page <title>, description, OpenGraph, Twitter and JSON-LD are
         injected by the <SEO /> component in src/components/SEO.jsx via
         react-helmet-async. Keeping a default <title> here for the no-JS case. -->
    <title>Sheyam Enterprises | Air Compressors &amp; Generators Vellore</title>

    <!-- Splash loader — inlined so it paints before the JS bundle loads.
         Total visible ~1.2s: logo fades in, red bar sweeps, then fade-out.
         The inline <script> at end-of-body removes the element so it never
         blocks pointer events after dismissal. -->
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #000000;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 22px;
        animation: app-loader-fade 0.4s ease-in-out 0.9s forwards;
      }
      #app-loader img {
        width: 180px;
        height: auto;
        opacity: 0;
        transform: translateY(8px);
        animation: app-loader-logo 0.5s ease-out 0.05s forwards;
      }
      #app-loader .bar {
        width: 120px;
        height: 2px;
        background: rgba(255,255,255,0.10);
        position: relative;
        overflow: hidden;
        opacity: 0;
        animation: app-loader-bar-show 0.4s ease-out 0.3s forwards;
      }
      #app-loader .bar::after {
        content: '';
        position: absolute;
        inset: 0;
        background: #CC1111;
        transform: translateX(-100%);
        animation: app-loader-bar 1.1s cubic-bezier(0.4, 0, 0.2, 1) 0.3s infinite;
      }
      @keyframes app-loader-logo {
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes app-loader-bar-show {
        to { opacity: 1; }
      }
      @keyframes app-loader-bar {
        0%   { transform: translateX(-100%); }
        50%  { transform: translateX(0%); }
        100% { transform: translateX(100%); }
      }
      @keyframes app-loader-fade {
        to { opacity: 0; visibility: hidden; }
      }
      /* Respect users who prefer reduced motion */
      @media (prefers-reduced-motion: reduce) {
        #app-loader,
        #app-loader img,
        #app-loader .bar,
        #app-loader .bar::after {
          animation-duration: 0.01s;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loader" aria-hidden="true">
      <img src="/logo.png" alt="" width="180" height="84" />
      <div class="bar"></div>
    </div>
    <div id="root"></div>
    <script>
      // Remove the splash element once the fade-out has finished so it
      // never blocks clicks underneath. Falls back to load event if the
      // animation timer is somehow throttled (background tabs).
      window.setTimeout(function () {
        var el = document.getElementById('app-loader');
        if (el && el.parentNode) el.parentNode.removeChild(el);
      }, 1400);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
